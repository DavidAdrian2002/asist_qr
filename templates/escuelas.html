{% extends "base.html" %}

{% block content %}

<h3>Escuelas</h3>

<form method="POST" action="/add_escuela" class="mb-4">

    <div class="row g-2">
        <div class="col-8">
            <input type="text" name="nombre" class="form-control" placeholder="Nombre de la escuela" required>
        </div>
        <div class="col-4">
            <button class="btn btn-primary w-100">Agregar</button>
        </div>
    </div>

</form>

<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for e in escuelas %}
        <tr>
            <td>{{ e["id"] }}</td>
            <td>{{ e["nombre"] }}</td>
            <td>
                <a href="/edit_escuela/{{ e['id'] }}" class="btn btn-warning btn-sm">Editar</a>
                <a href="/delete_escuela/{{ e['id'] }}" class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Eliminar esta escuela?')">Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
