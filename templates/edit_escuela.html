{% extends "base.html" %}

{% block content %}

<h3>Editar Escuela</h3>

<form method="POST">

    <div class="mb-3">
        <input type="text" name="nombre" class="form-control"
               value="{{ escuela['nombre'] }}" required>
    </div>

    <button class="btn btn-primary">Guardar cambios</button>
    <a href="/escuelas" class="btn btn-secondary">Cancelar</a>

</form>

{% endblock %}
